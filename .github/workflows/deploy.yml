name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # You can change this to match your local Node version
          cache: "npm" # Change to 'yarn' or 'pnpm' if you use those
      - name: Install dependencies
        run: npm ci # Use `npm install` if you don't have a package-lock.json, or yarn/pnpm equivalents
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # This is where Vite outputs the build files
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
